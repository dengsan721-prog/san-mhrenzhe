<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>元素幻影学院</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite">
      <section class="screen start-screen premium-start">
        <div class="academy-crest">
          <span class="crest-aurora"></span>
          <span class="crest-wing crest-wing-left"></span>
          <span class="crest-wing crest-wing-right"></span>
          <span class="crest-crown"><i></i><i></i><i></i></span>
          <div class="title-orbit-icon" aria-hidden="true">
            <span class="crest-gem"></span>
            <span class="icon-core">幻</span>
            <span class="icon-blade blade-fire"></span>
            <span class="icon-blade blade-ice"></span>
            <span class="icon-blade blade-lightning"></span>
            <span class="icon-blade blade-earth"></span>
            <span class="icon-blade blade-wind"></span>
            <span class="icon-blade blade-shadow"></span>
            <span class="crest-spark spark-one"></span>
            <span class="crest-spark spark-two"></span>
            <span class="crest-spark spark-three"></span>
          </div>
          <h1 class="academy-title">元素幻影学院</h1>
        </div>
        <p class="mystery-copy">六道元素之门在云海中醒来，只有真正的观察力、勇气和智慧，才能让隐藏徽章现形。</p>
        <div class="beast-hall" aria-hidden="true">
          <span class="hall-skyline"></span>
          <div class="hall-core">元素集结</div>
          <div class="flame-anim hall-flame"><span></span><span></span><span></span></div>
          <div class="wave-anim hall-wave"><span></span><span></span></div>
          <div class="beast-grid">
            <div class="beast-totem beast-firebird beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">凤</span><span class="beast-name">火凤</span></div>
            <div class="beast-totem beast-icekirin beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">麟</span><span class="beast-name">冰麒麟</span></div>
            <div class="beast-totem beast-thundertiger beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">虎</span><span class="beast-name">雷虎</span></div>
            <div class="beast-totem beast-rockturtle beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">龟</span><span class="beast-name">岩龟</span></div>
            <div class="beast-totem beast-winddragon beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">龙</span><span class="beast-name">风龙</span></div>
            <div class="beast-totem beast-shadowdeer beast-mini"><span class="beast-aura"></span><span class="beast-tail"></span><span class="beast-wing beast-wing-left"></span><span class="beast-wing beast-wing-right"></span><span class="beast-body"></span><span class="beast-head"><i></i><i></i></span><span class="beast-horn"></span><span class="beast-rune">鹿</span><span class="beast-name">影鹿</span></div>
          </div>
        </div>
        <div class="energy-forge" aria-hidden="true">
          <span class="forge-ring ring-outer"></span>
          <span class="forge-ring ring-middle"></span>
          <span class="forge-ring ring-inner"></span>
          <span class="forge-crystal crystal-fire"></span>
          <span class="forge-crystal crystal-ice"></span>
          <span class="forge-crystal crystal-lightning"></span>
          <span class="forge-crystal crystal-earth"></span>
          <span class="forge-crystal crystal-wind"></span>
          <span class="forge-crystal crystal-shadow"></span>
          <div class="portal-gate">
            <span class="portal-star"></span>
            <span class="portal-mist"></span>
          </div>
          <div class="flame-anim forge-flame"><span></span><span></span><span></span></div>
          <div class="wave-anim forge-wave"><span></span><span></span></div>
        </div>
        <button class="primary-button" type="button">开始训练冒险</button>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
